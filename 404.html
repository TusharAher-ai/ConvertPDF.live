      document.body.classList.add(t);

  } catch(e) {}
})();
</script>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Page Not Found — ConvertPDF.Live</title>
<meta name="robots" content="noindex,follow"/>
<meta http-equiv="refresh" content="3;url=https://convertpdf.live/"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f0f2f5;color:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.wrap{max-width:480px}
.icon{font-size:4rem;margin-bottom:16px}
h1{font-size:1.8rem;font-weight:800;margin-bottom:8px}
p{color:#6b6b8a;margin-bottom:24px;line-height:1.6}
a{display:inline-block;background:#b07800;color:#fff;padding:12px 28px;border-radius:50px;text-decoration:none;font-weight:700;font-size:.9rem}
a:hover{background:#8a5c00}
</style>
<style>
/* ── DARK / LIGHT MODE ── */

html,body{background:var(--bg);transition:background .3s,color .3s}
body{color:var(--txt)}

body.light{--bg:#f0f2f5;--surf:#fff;--surf2:#e8eaf0;--bdr:#c4c6d8;--txt:#1a1a2e;--mut:#4a4a6a}
</style>
<link rel="stylesheet" href="./shared.css"/>
<link rel="stylesheet" href="./design-system.css" data-ds="1"/>
</head>
<body class="light">
<div class="wrap">
  <div class="icon">📄</div>
  <h1>Page Not Found</h1>
  <p>This page doesn't exist or has moved.<br/>Redirecting you to the dashboard in 3 seconds…</p>
  <a href="https://convertpdf.live/">&#8592; Back to Tools to PDF Tools</a>
</div>

<!-- ─── SUGGEST FEATURE MODAL ─── -->
<div id="suggest-modal" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surf);border-radius:14px;padding:28px 28px 22px;max-width:480px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.4);border:1.5px solid var(--bdr);position:relative;max-height:90vh;overflow-y:auto">
    <button onclick="closeSuggestModal()" style="position:absolute;top:12px;right:14px;background:transparent;border:none;font-size:1.2rem;cursor:pointer;color:var(--mut);line-height:1">✕</button>
    <h3 style="font-family:var(--fd);font-weight:800;font-size:1.1rem;color:var(--txt);margin:0 0 4px">💡 Suggest a Feature</h3>
    <p style="font-size:.78rem;color:var(--mut);margin:0 0 18px">We read every suggestion. Fill in the form and we'll receive it directly.</p>

    <div style="margin-bottom:12px">
      <label style="font-family:var(--fm);font-size:.7rem;color:var(--mut);display:block;margin-bottom:4px">Your Name <span style="color:var(--acc3)">*</span></label>
      <input id="sg-name" type="text" placeholder="e.g. John Doe" style="width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:7px;font-size:.84rem;background:var(--surf2);color:var(--txt);outline:none;box-sizing:border-box" onfocus="this.style.borderColor='var(--acc)'" onblur="this.style.borderColor='var(--bdr)'"/>
    </div>

    <div style="margin-bottom:12px">
      <label style="font-family:var(--fm);font-size:.7rem;color:var(--mut);display:block;margin-bottom:4px">Your Email <span style="color:var(--acc3)">*</span></label>
      <input id="sg-email" type="email" placeholder="e.g. you@email.com" style="width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:7px;font-size:.84rem;background:var(--surf2);color:var(--txt);outline:none;box-sizing:border-box" onfocus="this.style.borderColor='var(--acc)'" onblur="this.style.borderColor='var(--bdr)'"/>
    </div>

    <div style="margin-bottom:12px">
      <label style="font-family:var(--fm);font-size:.7rem;color:var(--mut);display:block;margin-bottom:4px">Suggestion Type</label>
      <select id="sg-type" style="width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:7px;font-size:.84rem;background:var(--surf2);color:var(--txt);outline:none;box-sizing:border-box" onchange="toggleSgOther()">
        <option value="">— Select type —</option>
        <option value="New Tool">🛠️ New Tool Request</option>
        <option value="Bug Report">🐛 Bug Report</option>
        <option value="UI Improvement">🎨 UI / Design Improvement</option>
        <option value="Performance Issue">⚡ Performance Issue</option>
        <option value="Feature Enhancement">✨ Feature Enhancement</option>
        <option value="Other">💬 Other</option>
      </select>
    </div>

    <div style="margin-bottom:16px">
      <label style="font-family:var(--fm);font-size:.7rem;color:var(--mut);display:block;margin-bottom:4px">Description <span style="color:var(--acc3)">*</span></label>
      <textarea id="sg-desc" rows="4" placeholder="Describe your suggestion, bug, or idea in detail…" style="width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:7px;font-size:.84rem;background:var(--surf2);color:var(--txt);outline:none;resize:vertical;box-sizing:border-box;font-family:inherit" onfocus="this.style.borderColor='var(--acc)'" onblur="this.style.borderColor='var(--bdr)'"></textarea>
    </div>

    <div id="sg-error" style="display:none;color:var(--acc3);font-size:.76rem;margin-bottom:10px;background:rgba(240,64,144,.08);padding:7px 10px;border-radius:6px;border:1px solid rgba(240,64,144,.3)"></div>

    <div style="display:flex;gap:10px">
      <button onclick="closeSuggestModal()" style="flex:1;padding:10px;border:1.5px solid var(--bdr);border-radius:8px;background:transparent;color:var(--mut);font-family:var(--fd);font-weight:700;font-size:.82rem;cursor:pointer">Cancel</button>
      <button onclick="sendSuggestion()" style="flex:2;padding:10px;border:none;border-radius:8px;background:var(--acc);color:#1a1a2e;font-family:var(--fd);font-weight:800;font-size:.84rem;cursor:pointer">✉️ Send Suggestion</button>
    </div>
    <div id="sg-sent" style="display:none;text-align:center;padding:16px 0 6px;color:var(--ok);font-family:var(--fd);font-weight:700;font-size:.9rem">✓ Opening your email client…</div>
  </div>
</div>

<script>
function openSuggestModal(){
  var m=document.getElementById('suggest-modal');
  if(m){m.style.display='flex';}
}
function closeSuggestModal(){
  var m=document.getElementById('suggest-modal');
  if(m){m.style.display='none';}
  // Reset
  ['sg-name','sg-email','sg-desc'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  var sel=document.getElementById('sg-type');if(sel)sel.value='';
  var err=document.getElementById('sg-error');if(err)err.style.display='none';
  var sent=document.getElementById('sg-sent');if(sent)sent.style.display='none';
}
function toggleSgOther(){}
function sendSuggestion(){
  var name=document.getElementById('sg-name').value.trim();
  var email=document.getElementById('sg-email').value.trim();
  var type=document.getElementById('sg-type').value||'General';
  var desc=document.getElementById('sg-desc').value.trim();
  var err=document.getElementById('sg-error');
  // Validate
  if(!name){err.textContent='Please enter your name.';err.style.display='block';return;}
  if(!email||!email.includes('@')){err.textContent='Please enter a valid email address.';err.style.display='block';return;}
  if(!desc){err.textContent='Please describe your suggestion.';err.style.display='block';return;}
  err.style.display='none';
  // Build mailto — split string to avoid Cloudflare scan
  var to='convertpdf.live'+'@'+'gmail.com';
  var subj=encodeURIComponent('[ConvertPDF] '+type+' from '+name);
  var body=encodeURIComponent('Name: '+name+'\nEmail: '+email+'\nType: '+type+'\n\nSuggestion:\n'+desc+'\n\n---\nSent from ConvertPDF.Live');
  window.location.href='mai'+'lto:'+to+'?subject='+subj+'&body='+body;
  document.getElementById('sg-sent').style.display='block';
  setTimeout(function(){closeSuggestModal();},2500);
}
function openContactMail(){
  var to='convertpdf.live'+'@'+'gmail.com';
  window.location.href='mai'+'lto:'+to+'?subject='+encodeURIComponent('Contact from ConvertPDF.Live');
}
// Close modal on backdrop click
document.addEventListener('click',function(e){
  var m=document.getElementById('suggest-modal');
  if(m&&e.target===m) closeSuggestModal();
});
</script>

<script src="./header.js"></script>
</body>
</html>
